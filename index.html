<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#fdf6ee">
<title>Chris & Samm · Workout Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf6ee;
    --petal: #f7e8e0;
    --rose: #e8a4a4;
    --rose-deep: #c47a7a;
    --sage: #a8c4a2;
    --sage-deep: #6e9e68;
    --lavender: #c9c0dc;
    --lavender-deep: #8b7faa;
    --butter: #f5e6b8;
    --butter-deep: #c8a84b;
    --bark: #7a5c4a;
    --bark-light: #b8957a;
    --ink: #3d2e26;
    --ink-soft: #6b5248;
    --ink-muted: #9e8578;
    --white: #ffffff;
    --chris-primary: #6e9e68;
    --chris-light: #e4f0e2;
    --chris-mid: #a8c4a2;
    --samm-primary: #c47a7a;
    --samm-light: #f7e8e8;
    --samm-mid: #e8a4a4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Decorative background petals */
  body::before {
    content: '';
    position: fixed;
    top: -60px; right: -60px;
    width: 220px; height: 220px;
    background: radial-gradient(circle, #f7c5c5 0%, transparent 70%);
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -40px; left: -40px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, #a8c4a2 0%, transparent 70%);
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .app { max-width: 420px; margin: 0 auto; padding: 0 0 100px; position: relative; z-index: 1; }

  /* Header */
  .header {
    padding: 24px 20px 16px;
    text-align: center;
    position: relative;
  }
  .header-bloom {
    font-family: 'Lora', serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--ink-muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .header-title {
    font-family: 'Lora', serif;
    font-size: 24px;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: -0.3px;
  }
  .header-title span { font-style: italic; color: var(--bark-light); }
  .header-date {
    font-size: 12px;
    color: var(--ink-muted);
    margin-top: 4px;
  }
  .divider-floral {
    text-align: center;
    font-size: 16px;
    color: var(--rose);
    letter-spacing: 6px;
    margin: 4px 0 16px;
    opacity: 0.7;
  }

  /* User selector */
  .user-select {
    display: flex;
    gap: 10px;
    padding: 0 20px;
    margin-bottom: 18px;
  }
  .user-btn {
    flex: 1;
    padding: 12px 8px;
    border-radius: 16px;
    border: 1.5px solid transparent;
    background: var(--white);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    text-align: center;
  }
  .user-btn:active { transform: scale(0.97); }
  .user-btn-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Lora', serif;
    font-size: 14px;
    font-weight: 500;
    margin: 0 auto 6px;
    transition: all 0.2s;
  }
  .user-btn-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
  }
  .user-btn.chris-active {
    border-color: var(--chris-primary);
    background: var(--chris-light);
  }
  .user-btn.chris-active .user-btn-name { color: var(--chris-primary); }
  .user-btn.samm-active {
    border-color: var(--samm-primary);
    background: var(--samm-light);
  }
  .user-btn.samm-active .user-btn-name { color: var(--samm-primary); }

  /* Nav tabs */
  .nav {
    display: flex;
    gap: 0;
    padding: 0 20px;
    margin-bottom: 20px;
    background: var(--petal);
    border-radius: 14px;
    margin: 0 20px 20px;
    padding: 4px;
  }
  .nav-btn {
    flex: 1;
    padding: 9px 0;
    border-radius: 10px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-muted);
    transition: all 0.2s;
  }
  .nav-btn.active {
    background: var(--white);
    color: var(--ink);
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  /* Metric cards */
  .metrics {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 0 20px;
    margin-bottom: 20px;
  }
  .metric-card {
    background: var(--white);
    border-radius: 14px;
    padding: 12px 10px;
    text-align: center;
    border: 1px solid rgba(168,196,162,0.2);
  }
  .metric-label {
    font-size: 10px;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 4px;
  }
  .metric-val {
    font-family: 'Lora', serif;
    font-size: 22px;
    color: var(--ink);
    font-weight: 400;
  }
  .metric-sub { font-size: 10px; color: var(--ink-muted); margin-top: 1px; }

  /* Section label */
  .section-label {
    padding: 0 20px;
    margin-bottom: 12px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, rgba(168,196,162,0.4), transparent);
  }

  /* Exercise cards */
  .ex-card {
    margin: 0 20px 12px;
    background: var(--white);
    border-radius: 18px;
    padding: 16px 18px;
    border: 1px solid rgba(228,192,196,0.25);
    transition: box-shadow 0.2s;
  }
  .ex-card:active { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .ex-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .ex-num {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 2px;
  }
  .ex-name {
    font-family: 'Lora', serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 2px;
  }
  .ex-muscles { font-size: 11px; color: var(--ink-muted); }
  .ex-badge {
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 99px;
    background: var(--petal);
    color: var(--ink-soft);
    white-space: nowrap;
    font-weight: 500;
  }

  .weight-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .weight-label { font-size: 12px; color: var(--ink-muted); flex-shrink: 0; }
  .weight-input-wrap { display: flex; align-items: center; gap: 6px; flex: 1; }
  .weight-input {
    width: 80px;
    padding: 8px 12px;
    border: 1.5px solid rgba(168,196,162,0.4);
    border-radius: 10px;
    font-size: 15px;
    font-family: 'Lora', serif;
    color: var(--ink);
    background: var(--cream);
    outline: none;
    transition: border-color 0.2s;
  }
  .weight-input:focus { border-color: var(--sage); }
  .weight-unit { font-size: 12px; color: var(--ink-muted); }
  .last-weight { font-size: 11px; color: var(--ink-muted); }
  .delta-badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 99px;
    font-weight: 500;
  }
  .delta-up { background: #e4f0e2; color: var(--sage-deep); }
  .delta-autofill { background: var(--butter); color: var(--butter-deep); font-style: italic; }
  .weight-input.autofilled { border-color: rgba(197,168,75,0.5); color: var(--bark-light); }
  .weight-input.autofilled:focus { border-color: var(--butter-deep); color: var(--ink); }
  .delta-same { background: var(--petal); color: var(--ink-muted); }

  /* Done button */
  .done-btn {
    display: block;
    width: calc(100% - 40px);
    margin: 6px 20px 0;
    padding: 15px;
    border-radius: 16px;
    border: 1.5px solid var(--sage-mid, #a8c4a2);
    background: var(--white);
    cursor: pointer;
    font-family: 'Lora', serif;
    font-size: 15px;
    color: var(--ink-soft);
    transition: all 0.2s;
    letter-spacing: 0.01em;
  }
  .done-btn:active { transform: scale(0.98); }
  .done-btn.completed {
    background: var(--chris-light);
    border-color: var(--chris-primary);
    color: var(--chris-primary);
  }
  .done-btn.completed.samm {
    background: var(--samm-light);
    border-color: var(--samm-primary);
    color: var(--samm-primary);
  }

  /* Progress view */
  .progress-wrap { padding: 0 20px; }
  .hist-block { margin-bottom: 24px; }
  .hist-name {
    font-family: 'Lora', serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 10px;
  }
  .hist-chart {
    display: flex;
    align-items: flex-end;
    gap: 5px;
    height: 70px;
    margin-bottom: 5px;
  }
  .hist-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
  .hist-bar { width: 100%; border-radius: 4px 4px 0 0; min-height: 5px; }
  .hist-bar-label { font-size: 9px; color: var(--ink-muted); }
  .hist-dates { display: flex; gap: 5px; }
  .hist-date-col { flex: 1; text-align: center; font-size: 9px; color: var(--ink-muted); }
  .hist-trend { font-size: 12px; color: var(--ink-muted); margin-top: 6px; }
  .hist-empty { font-size: 13px; color: var(--ink-muted); font-style: italic; padding: 8px 0; }

  /* Whose progress toggle in progress view */
  .progress-user-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .prog-user-btn {
    flex: 1;
    padding: 8px;
    border-radius: 10px;
    border: 1px solid rgba(0,0,0,0.08);
    background: var(--white);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-muted);
    transition: all 0.15s;
  }
  .prog-user-btn.active-chris { background: var(--chris-light); color: var(--chris-primary); border-color: var(--chris-mid); }
  .prog-user-btn.active-samm { background: var(--samm-light); color: var(--samm-primary); border-color: var(--samm-mid); }

  /* Loading / sync states */
  .sync-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--sage);
    margin-left: 6px;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--cream);
    padding: 10px 22px;
    border-radius: 99px;
    font-size: 13px;
    font-weight: 500;
    z-index: 999;
    pointer-events: none;
    white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
  }

  /* Onboarding / loading screen */
  .screen-center {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
    text-align: center;
  }
  .screen-flower { font-size: 48px; margin-bottom: 16px; }
  .screen-title { font-family: 'Lora', serif; font-size: 26px; color: var(--ink); margin-bottom: 8px; }
  .screen-sub { font-size: 14px; color: var(--ink-muted); line-height: 1.6; margin-bottom: 32px; }
  .screen-btn {
    width: 100%;
    padding: 15px;
    border-radius: 16px;
    border: none;
    cursor: pointer;
    font-family: 'Lora', serif;
    font-size: 16px;
    margin-bottom: 12px;
    transition: transform 0.15s;
  }
  .screen-btn:active { transform: scale(0.97); }
  .screen-btn-chris { background: var(--chris-light); color: var(--chris-primary); }
  .screen-btn-samm { background: var(--samm-light); color: var(--samm-primary); }

  /* Setup instructions */
  .setup-card {
    background: var(--white);
    border: 1px solid rgba(168,196,162,0.3);
    border-radius: 18px;
    padding: 20px;
    margin: 16px 20px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--ink-soft);
  }
  .setup-card h3 {
    font-family: 'Lora', serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 10px;
  }
  .setup-card ol { padding-left: 18px; }
  .setup-card li { margin-bottom: 6px; }
  .setup-card code {
    background: var(--petal);
    padding: 1px 5px;
    border-radius: 4px;
    font-family: monospace;
    font-size: 12px;
    color: var(--bark);
  }
  .setup-card a { color: var(--sage-deep); }

  /* Config input area */
  .config-input {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid rgba(168,196,162,0.4);
    border-radius: 10px;
    font-size: 12px;
    font-family: monospace;
    color: var(--ink);
    background: var(--cream);
    resize: vertical;
    min-height: 80px;
    margin-top: 8px;
    outline: none;
  }
  .config-input:focus { border-color: var(--sage); }
  .config-btn {
    margin-top: 10px;
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: var(--sage);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }

  .flower-divider { text-align: center; color: var(--rose); font-size: 14px; letter-spacing: 8px; opacity: 0.5; margin: 8px 0; }
  input[type='date']:focus { border-color: var(--sage) !important; }
  input[type='date']::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }
</style>
</head>
<body>

<div id="root"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const EXERCISES = [
  { id: 'goblet', name: 'Goblet squat', muscles: 'Quads · Glutes · Core' },
  { id: 'rdl', name: 'Romanian deadlift', muscles: 'Hamstrings · Glutes · Low back' },
  { id: 'row', name: 'Bent-over row', muscles: 'Upper back · Biceps · Core' },
];

const USERS = {
  chris: { name: 'Chris', initials: 'CJ', primary: '#6e9e68', light: '#e4f0e2', mid: '#a8c4a2' },
  samm:  { name: 'Samm',  initials: 'S',  primary: '#c47a7a', light: '#f7e8e8', mid: '#e8a4a4' },
};

const FLOWER = '✿';
const FLOWERS = ['✿','❀','✾'];

// ── State ─────────────────────────────────────────────────────────────────────
let db = null;
let state = {
  screen: 'loading',   // loading | setup | choose | app
  activeUser: null,
  view: 'log',
  progUser: 'chris',
  sessions: { chris: {}, samm: {} },
  syncing: false,
  toast: null,
  toastTimer: null,
  configText: '',
  logDate: null,   // null = today; string YYYY-MM-DD = backdated
};

function todayKey() { return new Date().toISOString().slice(0, 10); }
function fmtDate(iso) { return new Date(iso).toLocaleDateString('en-CA', { month: 'short', day: 'numeric' }); }

function setState(patch) { Object.assign(state, patch); render(); }
function showToast(msg) {
  if (state.toastTimer) clearTimeout(state.toastTimer);
  state.toast = msg;
  state.toastTimer = setTimeout(() => { state.toast = null; render(); }, 2400);
  render();
}

// ── Firebase helpers ──────────────────────────────────────────────────────────
function tryInitFirebase(config) {
  try {
    const app = initializeApp(config, 'workout-tracker');
    db = getFirestore(app);
    return true;
  } catch (e) {
    console.error(e);
    return false;
  }
}

function subscribeToData() {
  if (!db) return;
  const ref = doc(db, 'workout-tracker', 'shared');
  onSnapshot(ref, snap => {
    if (snap.exists()) {
      const d = snap.data();
      state.sessions = d.sessions || { chris: {}, samm: {} };
    }
    if (state.screen === 'loading') state.screen = 'choose';
    render();
  }, err => {
    console.error('Firestore error', err);
    if (state.screen === 'loading') { state.screen = 'choose'; render(); }
  });
}

async function persistSession(userId, date, sessionData) {
  if (!db) return;
  setState({ syncing: true });
  try {
    const ref = doc(db, 'workout-tracker', 'shared');
    const snap = await getDoc(ref);
    const existing = snap.exists() ? snap.data() : { sessions: { chris: {}, samm: {} } };
    if (!existing.sessions[userId]) existing.sessions[userId] = {};
    existing.sessions[userId][date] = { ...existing.sessions[userId][date], ...sessionData };
    await setDoc(ref, existing, { merge: true });
  } catch (e) { console.error(e); }
  setState({ syncing: false });
}

// ── Config from localStorage ──────────────────────────────────────────────────
const STORAGE_KEY = 'wt-firebase-config';
function loadSavedConfig() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; }
}
function saveConfig(cfg) { localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg)); }

// ── Boot ──────────────────────────────────────────────────────────────────────
const saved = loadSavedConfig();
if (saved) {
  const ok = tryInitFirebase(saved);
  if (ok) { state.screen = 'loading'; subscribeToData(); }
  else state.screen = 'setup';
} else {
  state.screen = 'setup';
}

// ── Actions ───────────────────────────────────────────────────────────────────
function applyConfig() {
  const text = state.configText.trim();
  try {
    let obj;
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (jsonMatch) obj = JSON.parse(jsonMatch[0]);
    else throw new Error('No JSON object found');
    const ok = tryInitFirebase(obj);
    if (!ok) throw new Error('Init failed');
    saveConfig(obj);
    setState({ screen: 'loading' });
    subscribeToData();
  } catch (e) {
    showToast('Could not read config — see instructions below');
  }
}

function setWeight(userId, exId, value) {
  const date = state.logDate || todayKey();
  if (!state.sessions[userId]) state.sessions[userId] = {};
  if (!state.sessions[userId][date]) state.sessions[userId][date] = {};
  state.sessions[userId][date][exId] = { weight: value };
  render();
  persistSession(userId, date, state.sessions[userId][date]);
}

function markDone(userId) {
  const date = state.logDate || todayKey();
  if (!state.sessions[userId]) state.sessions[userId] = {};
  if (!state.sessions[userId][date]) state.sessions[userId][date] = {};
  state.sessions[userId][date].__done = true;
  render();
  persistSession(userId, date, state.sessions[userId][date]);
  showToast(FLOWER + ' Session logged!');
}

function getHistory(userId, exId, upToDate) {
  const userSessions = state.sessions?.[userId] || {};
  const cutoff = upToDate || todayKey();
  return Object.entries(userSessions)
    .filter(([date, s]) => s[exId]?.weight && date < cutoff)
    .map(([date, s]) => ({ date, weight: parseFloat(s[exId].weight) }))
    .sort((a, b) => a.date.localeCompare(b.date))
    .slice(-8);
}

function getTotalSessions(userId) {
  return Object.values(state.sessions?.[userId] || {}).filter(s => s.__done).length;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const root = document.getElementById('root');
  root.innerHTML = '';

  if (state.toast) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = state.toast;
    root.appendChild(t);
  }

  if (state.screen === 'setup') { renderSetup(root); return; }
  if (state.screen === 'loading') { renderLoading(root); return; }
  if (state.screen === 'choose') { renderChoose(root); return; }
  renderApp(root);
}

function renderLoading(root) {
  const d = document.createElement('div');
  d.className = 'screen-center';
  d.innerHTML = `<div class="screen-flower">✿</div>
    <div class="screen-title">Connecting…</div>
    <div class="screen-sub">Syncing with Firestore<span class="sync-dot"></span></div>`;
  root.appendChild(d);
}

function renderChoose(root) {
  const d = document.createElement('div');
  d.className = 'screen-center';
  d.innerHTML = `
    <div class="screen-flower">✿</div>
    <div class="screen-title">Who's working out?</div>
    <div class="screen-sub">Pick your name to log today's session.<br>You can switch anytime inside the app.</div>
    <button class="screen-btn screen-btn-chris" id="btn-chris">Chris</button>
    <button class="screen-btn screen-btn-samm" id="btn-samm">Samm</button>
  `;
  root.appendChild(d);
  d.querySelector('#btn-chris').onclick = () => setState({ screen: 'app', activeUser: 'chris' });
  d.querySelector('#btn-samm').onclick = () => setState({ screen: 'app', activeUser: 'samm' });
}

function renderSetup(root) {
  const app = document.createElement('div');
  app.className = 'app';

  app.innerHTML = `
    <div class="header">
      <div class="header-bloom">Setup required</div>
      <div class="header-title">Chris & <span>Samm</span></div>
    </div>
    <div class="divider-floral">✿ ❀ ✿</div>

    <div class="setup-card">
      <h3>One-time Firebase setup ✿</h3>
      <p style="margin-bottom:10px">This app uses Firebase (free) to sync data between your phones. Follow these steps once:</p>
      <ol>
        <li>Go to <a href="https://console.firebase.google.com" target="_blank">console.firebase.google.com</a> and sign in with a Google account.</li>
        <li>Click <strong>Add project</strong>, name it <code>workout-tracker</code>, disable Analytics if asked, click <strong>Create project</strong>.</li>
        <li>In the left sidebar, click <strong>Build → Firestore Database</strong>. Click <strong>Create database</strong>, choose <strong>Start in test mode</strong>, pick any region, click <strong>Done</strong>.</li>
        <li>In the left sidebar, click the gear icon → <strong>Project settings</strong>. Scroll to <strong>Your apps</strong>, click the web icon <code>&lt;/&gt;</code>, give it a nickname like <code>tracker</code>, click <strong>Register app</strong>.</li>
        <li>Copy the <code>firebaseConfig</code> object shown (the whole <code>{ apiKey: "...", ... }</code> block) and paste it below.</li>
      </ol>
      <textarea class="config-input" id="config-input" placeholder='Paste your firebaseConfig object here, e.g.
{
  "apiKey": "AIza...",
  "authDomain": "...",
  "projectId": "...",
  ...
}'>${state.configText}</textarea>
      <button class="config-btn" id="apply-btn">Connect & save ✿</button>
    </div>
    <div class="flower-divider">✿ ❀ ✿</div>
    <div style="text-align:center; font-size:11px; color:var(--ink-muted); padding-bottom:20px;">
      Once connected, this config is saved to your browser.<br>Samm does the same setup on her phone once.
    </div>
  `;

  root.appendChild(app);
  app.querySelector('#config-input').addEventListener('input', e => { state.configText = e.target.value; });
  app.querySelector('#apply-btn').onclick = applyConfig;
}

function renderApp(root) {
  const u = state.activeUser;
  const user = USERS[u];
  const today = todayKey();
  const logDate = state.logDate || today;
  const isBackdated = logDate !== today;
  const todaySesh = state.sessions?.[u]?.[logDate] || {};
  const isDone = !!todaySesh.__done;

  const app = document.createElement('div');
  app.className = 'app';

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'header';
  hdr.innerHTML = `
    <div class="header-bloom">Chris & Samm ✿</div>
    <div class="header-title">Workout <span>tracker</span></div>
    <div class="header-date">${new Date(logDate + 'T12:00:00').toLocaleDateString('en-CA', { weekday: 'long', month: 'long', day: 'numeric' })}${isBackdated ? ' <span style="font-size:10px;background:#faeeda;color:#854F0B;padding:1px 7px;border-radius:99px;font-style:italic;">backdated</span>' : ''}${state.syncing ? '<span class="sync-dot"></span>' : ''}</div>
  `;
  app.appendChild(hdr);

  // Floral divider
  const fd = document.createElement('div');
  fd.className = 'divider-floral';
  fd.textContent = '✿ ❀ ✿';
  app.appendChild(fd);

  // User selector
  const userSel = document.createElement('div');
  userSel.className = 'user-select';
  ['chris', 'samm'].forEach(uid => {
    const uu = USERS[uid];
    const btn = document.createElement('button');
    btn.className = `user-btn${u === uid ? ` ${uid}-active` : ''}`;
    btn.innerHTML = `
      <div class="user-btn-avatar" style="background:${uu.light}; color:${uu.primary}">${uu.initials}</div>
      <div class="user-btn-name">${uu.name}</div>
    `;
    btn.onclick = () => setState({ activeUser: uid });
    userSel.appendChild(btn);
  });
  app.appendChild(userSel);

  // Nav
  const nav = document.createElement('div');
  nav.className = 'nav';
  [['log','Log workout'], ['progress','Progress']].forEach(([id, label]) => {
    const btn = document.createElement('button');
    btn.className = `nav-btn${state.view === id ? ' active' : ''}`;
    btn.textContent = label;
    btn.onclick = () => setState({ view: id });
    nav.appendChild(btn);
  });
  app.appendChild(nav);

  if (state.view === 'log') {
    // Metrics
    const metrics = document.createElement('div');
    metrics.className = 'metrics';
    [
      ['Sessions', getTotalSessions(u), 'logged'],
      ['Target', '2×', 'per week'],
      ['Format', '3×10', 'sets × reps'],
    ].forEach(([label, val, sub]) => {
      metrics.innerHTML += `<div class="metric-card"><div class="metric-label">${label}</div><div class="metric-val">${val}</div><div class="metric-sub">${sub}</div></div>`;
    });
    app.appendChild(metrics);

    // Date picker row
    const dpRow = document.createElement('div');
    dpRow.style.cssText = 'display:flex;align-items:center;gap:10px;padding:0 20px;margin-bottom:14px;';
    const dpLabel = document.createElement('div');
    dpLabel.style.cssText = 'font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);flex-shrink:0;';
    dpLabel.textContent = isBackdated ? 'Logging for' : 'Today';
    const dpInput = document.createElement('input');
    dpInput.type = 'date';
    dpInput.value = logDate;
    dpInput.max = today;
    dpInput.style.cssText = 'flex:1;padding:6px 10px;border:1.5px solid rgba(168,196,162,0.4);border-radius:10px;font-size:13px;font-family:"DM Sans",sans-serif;color:var(--ink);background:var(--cream);outline:none;';
    dpInput.addEventListener('change', e => {
      const val = e.target.value;
      setState({ logDate: val === today ? null : val });
    });
    const dpClear = document.createElement('button');
    dpClear.style.cssText = `display:${isBackdated ? 'block' : 'none'};font-size:11px;padding:5px 10px;border-radius:8px;border:1px solid rgba(168,196,162,0.4);background:transparent;cursor:pointer;color:var(--ink-muted);font-family:'DM Sans',sans-serif;white-space:nowrap;`;
    dpClear.textContent = 'Back to today';
    dpClear.onclick = () => setState({ logDate: null });
    dpRow.appendChild(dpLabel);
    dpRow.appendChild(dpInput);
    dpRow.appendChild(dpClear);
    app.appendChild(dpRow);

    // Section label
    const sl = document.createElement('div');
    sl.className = 'section-label';
    sl.textContent = isBackdated ? `Session · ${fmtDate(logDate)}` : `Today · ${fmtDate(today)}`;
    app.appendChild(sl);

    // Exercise cards
    EXERCISES.forEach((ex, i) => {
      const card = document.createElement('div');
      card.className = 'ex-card';
      const todayVal = todaySesh[ex.id]?.weight || '';
      const hist = getHistory(u, ex.id, logDate);
      const lastW = hist.length ? hist[hist.length - 1].weight : null;
      const isAutoFilled = !todayVal && lastW !== null;
      const displayVal = todayVal || (lastW !== null ? lastW : '');
      let deltaHtml = '';
      if (todayVal && lastW) {
        const diff = parseFloat(todayVal) - lastW;
        if (diff > 0) deltaHtml = `<span class="delta-badge delta-up">+${diff} lb</span>`;
        else if (diff < 0) deltaHtml = `<span class="delta-badge delta-same">${diff} lb</span>`;
        else deltaHtml = `<span class="delta-badge delta-same">same</span>`;
      } else if (isAutoFilled) {
        deltaHtml = `<span class="delta-badge delta-autofill">last session</span>`;
      }

      card.innerHTML = `
        <div class="ex-header">
          <div>
            <div class="ex-num">Exercise 0${i+1}</div>
            <div class="ex-name">${ex.name}</div>
            <div class="ex-muscles">${ex.muscles}</div>
          </div>
          <div class="ex-badge">3 × 10</div>
        </div>
        <div class="weight-row">
          <div class="weight-label">Weight</div>
          <div class="weight-input-wrap">
            <input class="weight-input${isAutoFilled ? ' autofilled' : ''}" type="number" min="0" step="5" placeholder="lbs" value="${displayVal}" data-ex="${ex.id}" data-autofilled="${isAutoFilled ? '1' : '0'}" />
            <span class="weight-unit">lb</span>
          </div>
          ${deltaHtml}
        </div>
      `;
      app.appendChild(card);
    });

    // Done button
    const doneBtn = document.createElement('button');
    doneBtn.className = `done-btn${isDone ? ` completed${u === 'samm' ? ' samm' : ''}` : ''}`;
    doneBtn.textContent = isDone ? `✿ Session logged${isBackdated ? ' (backdated)' : ''}` : `Mark session done`;
    if (!isDone) doneBtn.onclick = () => markDone(u);
    app.appendChild(doneBtn);

    // Wire up weight inputs
    setTimeout(() => {
      app.querySelectorAll('.weight-input').forEach(input => {
        input.addEventListener('focus', e => {
          if (e.target.dataset.autofilled === '1') e.target.select();
        });
        input.addEventListener('change', e => {
          e.target.dataset.autofilled = '0';
          e.target.classList.remove('autofilled');
          if (e.target.value) setWeight(u, e.target.dataset.ex, e.target.value);
        });
      });
    }, 0);
  }

  if (state.view === 'progress') {
    // User toggle for progress
    const pu = state.progUser;
    const progRow = document.createElement('div');
    progRow.className = 'progress-user-row';
    progRow.style.padding = '0 20px';
    ['chris','samm'].forEach(uid => {
      const btn = document.createElement('button');
      btn.className = `prog-user-btn${pu === uid ? ` active-${uid}` : ''}`;
      btn.textContent = USERS[uid].name;
      btn.onclick = () => setState({ progUser: uid });
      progRow.appendChild(btn);
    });
    app.appendChild(progRow);

    const pw = document.createElement('div');
    pw.className = 'progress-wrap';
    const progColor = USERS[pu].primary;

    EXERCISES.forEach(ex => {
      const hist = getHistory(pu, ex.id);
      const block = document.createElement('div');
      block.className = 'hist-block';

      if (!hist.length) {
        block.innerHTML = `<div class="hist-name">${ex.name}</div><div class="hist-empty">No data yet — log some sessions first.</div>`;
      } else {
        const maxW = Math.max(...hist.map(h => h.weight));
        const bars = hist.map((h, i) => {
          const barH = Math.round((h.weight / maxW) * 56);
          const opacity = 0.35 + (i / hist.length) * 0.65;
          return `<div class="hist-col">
            <div class="hist-bar-label">${Math.round(h.weight)}</div>
            <div class="hist-bar" style="height:${barH}px; background:${progColor}; opacity:${opacity.toFixed(2)}"></div>
          </div>`;
        }).join('');
        const dates = hist.map(h => `<div class="hist-date-col">${fmtDate(h.date)}</div>`).join('');
        const diff = hist[hist.length-1].weight - hist[0].weight;
        const trend = diff > 0 ? `↑ Up ${diff} lb since first session` : diff < 0 ? `↓ Down ${Math.abs(diff)} lb` : 'Consistent weight maintained';

        block.innerHTML = `
          <div class="hist-name">${ex.name}</div>
          <div class="hist-chart">${bars}</div>
          <div class="hist-dates">${dates}</div>
          <div class="hist-trend">${trend}</div>
        `;
      }
      pw.appendChild(block);
    });
    app.appendChild(pw);
  }

  root.appendChild(app);
}

// Initial render
render();
</script>
</body>
</html>
